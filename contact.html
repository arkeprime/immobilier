<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARKE PIME - Contact Premium</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0A0A0A;
    color:white;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:black;
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.logo {
    font-size:20px;
    color:#D4AF37;
}

.nav-links {
    display:flex;
    gap:20px;
    list-style:none;
}

.nav-links a {
    color:white;
    text-decoration:none;
}

.cta-btn {
    background:#D4AF37;
    padding:10px 15px;
    border-radius:20px;
    color:black;
    text-decoration:none;
}

/* CONTAINER */
.container {
    padding:120px 20px 40px;
}

/* GRID */
.contact-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.contact-card {
    background:#1A1A1A;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* FORM */
.form-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

input, textarea {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
}

.submit-btn {
    width:100%;
    padding:15px;
    background:#D4AF37;
    border:none;
    border-radius:10px;
    margin-top:15px;
}

/* FOOTER */
footer {
    text-align:center;
    padding:20px;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

    nav {
        flex-direction:column;
        gap:10px;
    }

    .nav-links {
        flex-direction:column;
        text-align:center;
    }

    .contact-grid {
        grid-template-columns:1fr;
    }

    .form-grid {
        grid-template-columns:1fr;
    }

    .container {
        padding:100px 15px;
    }

}

</style>
</head>

<body>

<header>
<nav>
<div class="logo">ARKE PRIME</div>

<ul class="nav-links">
<li><a href="index.html">Accueil</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<a href="#form" class="cta-btn">Prendre RDV</a>
</nav>
</header>

<div class="container">

<div class="contact-grid">

<div class="contact-card">
<i class="fas fa-phone"></i>
<h3>Téléphone</h3>
<p>+213 558 24 26 20</p>
</div>

<div class="contact-card">
<i class="fas fa-envelope"></i>
<h3>Email</h3>
<p>primearke@gmail.com</p>
</div>

<div class="contact-card">
<i class="fas fa-map-marker-alt"></i>
<h3>Adresse</h3>
<p>Alger - Paris</p>
</div>

<div class="contact-card">
<i class="fas fa-clock"></i>
<h3>Horaires</h3>
<p>Samedi - Jeudi : 9h-20h</p>
</div>

</div>

<div class="main-form" id="form">

<form>

<div class="form-grid">
<input type="text" placeholder="Nom complet">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Téléphone">
<input type="number" placeholder="Budget">
</div>

<textarea placeholder="Message"></textarea>

<button class="submit-btn">Envoyer</button>

</form>

</div>

</div>

<footer>
<p>© ARKE PRIME</p>
</footer>

</body>
</html>
